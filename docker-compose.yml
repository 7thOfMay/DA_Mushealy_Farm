# ============================================================
# Docker Compose — NôngTech Smart Farm
# Services: PostgreSQL, Next.js App, IoT Gateway
# ============================================================

services:
  # --- PostgreSQL Database ---
  db:
    image: postgres:16-alpine
    container_name: nongtech-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nongtech_secret}
      POSTGRES_DB: ${DB_NAME:-smart_farm}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nongtech

  # --- Next.js Web Application ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nongtech-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-nongtech_secret}
      DB_NAME: ${DB_NAME:-smart_farm}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nongtech

  # --- IoT MQTT Gateway (Python) ---
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: nongtech-gateway
    restart: unless-stopped
    environment:
      MQTT_BROKER: ${MQTT_BROKER:-mqtt.ohstem.vn}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-SmartFarm}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-nongtech_secret}
      DB_NAME: ${DB_NAME:-smart_farm}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nongtech

volumes:
  pg_data:

networks:
  nongtech:
    driver: bridge
